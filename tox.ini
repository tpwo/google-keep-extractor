[tox]
envlist = py310, py311, py312, py313, py314
no_package = True

[testenv]
deps = -r requirements-dev.txt
commands =
    pytest {posargs}

[testenv:coverage]
base_python = 3.14
commands =
    coverage erase
    coverage run -m pytest {posargs}
    coverage xml
    coverage report

[testenv:pre-commit]
base_python = 3.14
deps =
    pre-commit
    pre-commit-uv
commands =
    pre-commit run --all-files

[testenv:regenerate]
base_python = 3.14
deps =
commands =
    python -m testing.regenerate_expected
